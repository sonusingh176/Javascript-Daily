<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promise Example</title>

    <style>
        .inputuser input{
            padding: 8px;
            border:2px solid black;
            border-radius: 5px;
        }

        .inputuser button{
            padding: 10px;
            background: rebeccapurple;
            color: white;
            border: none;
            border-radius: 2px;
        }

        .card{
            margin-top: 10px;
            padding: 10px;
            border: 1px solid #ccc;
            width: 300px;
        }
    </style>
</head>

<body>

    <div class="inputuser">
        <input type="text" placeholder="search name" id="searchInput">
        <button id="searchbtn">search</button>
    </div>

    <div class="card">
        <div class="body">
            <p class="username"></p>
            <p class="useremail"></p>
        </div>
    </div>

<script>

const uname = document.querySelector('.username');
const uemail = document.querySelector('.useremail');
const searchInput = document.getElementById('searchInput');


function getUsers(){
    return [
        { username:'john', email:'john@test.com' },
        { username:'Amit', email:'amit@test.com' },
        { username:'priya', email:'priya@test.com' }
    ];
}


// Promise Function
function findUser(username){

    return new Promise((resolve, reject)=>{

        console.log("Searching user...");

        // simulate async operation
        setTimeout(()=>{

            const users = getUsers();

            const user = users.find(
                (user)=> user.username.toLowerCase() === username.toLowerCase()
            );

            if(user){
                resolve(user);
            }else{
                reject("User not found");
            }

        },2000);

    });

}



document.getElementById('searchbtn').addEventListener('click',()=>{

    const name = searchInput.value;

    uname.innerText = "Loading...";
    uemail.innerText = "";

    findUser(name)

    .then((user)=>{

        uname.innerText = user.username;
        uemail.innerText = user.email;

    })

    .catch((error)=>{

        uname.innerText = error;
        uemail.innerText = "";

    });

});

</script>

</body>
</html>
